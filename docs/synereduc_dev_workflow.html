
<style>
  h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  .wf{padding:1rem 0;font-size:14px}
  .step{display:flex;gap:0;margin-bottom:4px;align-items:stretch}
  .step-num{width:32px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:14px}
  .num-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
  .vline{width:2px;flex:1;margin-top:6px}
  .step-body{flex:1;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;background:var(--color-background-primary);cursor:pointer;transition:border-color .15s;margin-left:10px;margin-bottom:0}
  .step-body:hover{border-color:var(--color-border-secondary)}
  .step-body.active{border-color:var(--color-border-info);background:var(--color-background-info)}
  .step-header{display:flex;align-items:center;gap:8px}
  .step-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
  .step-tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;border:0.5px solid}
  .tag-done{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
  .tag-next{background:var(--color-background-warning);color:var(--color-text-warning);border-color:var(--color-border-warning)}
  .tag-future{background:var(--color-background-secondary);color:var(--color-text-secondary);border-color:var(--color-border-tertiary)}
  .step-sub{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
  .step-detail{display:none;margin-top:12px;border-top:0.5px solid var(--color-border-tertiary);padding-top:12px}
  .step-detail.open{display:block}
  .detail-section{margin-bottom:12px}
  .detail-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .detail-text{font-size:13px;color:var(--color-text-secondary);line-height:1.5}
  .analogy-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:12px;color:var(--color-text-secondary);line-height:1.5;border-left:3px solid var(--color-border-info)}
  .analogy-box strong{color:var(--color-text-primary)}
  .file-box{display:inline-flex;align-items:center;gap:6px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:4px 10px;font-size:12px;font-family:monospace;color:var(--color-text-primary);margin:2px}
  .safe-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success)}
  .cta-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-primary)}
  .cta-btn:hover{background:var(--color-background-secondary)}
</style>
<div class="wf">
  <h2 class="sr-only">Fluxo de trabalho profissional para desenvolvimento com IA — clique em cada etapa para entender o que é e como funciona</h2>
  <div id="steps"></div>
</div>
<script>
const steps=[
  {
    color:'#1D9E75',tag:'tag-done',tagText:'Já feito ✅',
    title:'README',
    sub:'Apresentação do projeto no GitHub',
    analogy:'É o cartão de visitas do projeto. Qualquer desenvolvedor que chega no repositório precisa entender em 2 minutos o que é o sistema, quais tecnologias usa e o que já está pronto.',
    oQue:'Um arquivo <code>README.md</code> na raiz do projeto que descreve tudo sobre o sistema: stack, funcionalidades, perfis de acesso, regras de negócio e roadmap.',
    porQue:'Sem um README bom, nenhuma IA — e nenhum desenvolvedor humano — consegue ajudar com eficiência. É a porta de entrada.',
    arquivo:'<span class="file-box"><i class="ti ti-file-description" aria-hidden="true"></i>README.md</span>',
    seguro:'Apenas documentação. Zero risco ao sistema em produção.',
  },
  {
    color:'#EF9F27',tag:'tag-next',tagText:'Próximo passo ⚡',
    title:'Skills',
    sub:'Regras da sua stack para a IA não errar',
    analogy:'Imagina que você contratou um desenvolvedor novo e antes de ele codar qualquer coisa, você senta com ele e explica: "aqui usamos sempre esse padrão, nunca faça aquilo, esse campo tem uma pegadinha". As Skills são exatamente isso — mas por escrito, para a IA.',
    oQue:'Arquivos de texto (`.md`) que ficam dentro do projeto explicando as regras específicas de cada tecnologia <em>no contexto do SynerEduc</em>. Por exemplo:<br><br><strong>Skill de Supabase:</strong> "sempre use `.ilike()` em `fichas_matricula.segmento`", "DELETE silencioso — cheque `count === 0`", "nunca crie segundo cliente".<br><strong>Skill de React:</strong> "sem React Router — navegação via useState", "dark mode sempre com variáveis CSS, nunca `bg-white`".<br><strong>Skill de PDF:</strong> "sempre `window.print()`, nunca jsPDF para boletins".',
    porQue:'A IA tem conhecimento geral das tecnologias, mas não conhece os seus padrões específicos. Sem as Skills, ela vai inventar soluções que tecnicamente funcionam — mas que quebram o seu projeto.',
    arquivo:'<span class="file-box"><i class="ti ti-file-description" aria-hidden="true"></i>.cursor/rules/supabase.md</span> <span class="file-box"><i class="ti ti-file-description" aria-hidden="true"></i>react.md</span> <span class="file-box"><i class="ti ti-file-description" aria-hidden="true"></i>patterns.md</span>',
    seguro:'Apenas documentação. Zero risco ao sistema em produção.',
  },
  {
    color:'#EF9F27',tag:'tag-next',tagText:'Próximo passo ⚡',
    title:'PRD',
    sub:'O que o produto precisa fazer — visão de negócio',
    analogy:'É a planta baixa de uma casa antes de qualquer tijolo ser colocado. O arquiteto descreve cada cômodo, para quem serve e como se conecta. O engenheiro lê isso e só então começa a calcular a estrutura.',
    oQue:'Um documento (`PRD.md`) escrito em linguagem de negócio — sem código. Descreve o que cada funcionalidade precisa fazer, para quem, qual problema resolve e como medir se funcionou.<br><br>Para os agentes de IA do SynerEduc ficaria assim:<br><em>"O agente do coordenador precisa identificar alunos em risco. Critério de risco: frequência abaixo de 75% OU média abaixo de 5,0 em qualquer disciplina. O agente deve listar esses alunos com os dados específicos e sugerir intervenção. O coordenador pode aprovar ou editar a sugestão antes de enviar."</em>',
    porQue:'Sem PRD, você pede para a IA implementar algo vago. Ela implementa, você vê o resultado e diz "não era bem isso". Com PRD, o que vai ser construído está definido antes do primeiro linha de código.',
    arquivo:'<span class="file-box"><i class="ti ti-file-description" aria-hidden="true"></i>PRD.md</span>',
    seguro:'Apenas documentação. Zero risco ao sistema em produção.',
  },
  {
    color:'#EF9F27',tag:'tag-next',tagText:'Próximo passo ⚡',
    title:'SPEC',
    sub:'Como implementar tecnicamente — visão de código',
    analogy:'Se o PRD é a planta baixa, a SPEC é o projeto estrutural. O engenheiro calculou cada viga, cada fundação, cada instalação. O pedreiro recebe isso e sabe exatamente o que fazer — sem precisar tomar nenhuma decisão por conta própria.',
    oQue:'Um documento (`SPEC.md`) que detalha tecnicamente como o PRD vai ser implementado. Para cada funcionalidade do PRD, a SPEC diz:<br><br>• Quais componentes React criar ou modificar<br>• Quais queries no Supabase fazer<br>• Quais props e tipos TypeScript usar<br>• Qual a estrutura dos dados que entram e saem<br>• Quais edge cases tratar<br><br>A IA lê a SPEC e implementa. Não precisa adivinhar nada.',
    porQue:'A SPEC elimina o vai-e-vem. Sem ela, a IA faz escolhas técnicas que podem conflitar com o seu projeto. Com ela, a implementação fica previsível e revisável.',
    arquivo:'<span class="file-box"><i class="ti ti-file-description" aria-hidden="true"></i>SPEC.md</span>',
    seguro:'Apenas documentação. Zero risco ao sistema em produção.',
  },
  {
    color:'#378ADD',tag:'tag-future',tagText:'Em seguida',
    title:'Issues no GitHub',
    sub:'Cada tarefa vira uma issue rastreável',
    analogy:'É o quadro de tarefas de uma obra. Cada coisa a ser feita tem um post-it: o que fazer, quem faz, quando está pronto. Você olha o quadro e sabe exatamente o que está andando e o que está parado.',
    oQue:'A partir da SPEC, a IA abre Issues no seu repositório GitHub — uma por funcionalidade. Cada issue tem:<br>• Título claro ("Criar componente ChatIA flutuante")<br>• Descrição do que precisa ser feito<br>• Critérios para considerar pronto<br>• Link para a seção da SPEC de referência<br><br>Você vê tudo no GitHub: pendente, em andamento, concluído.',
    porQue:'Sem rastreamento, você perde o fio da meada. Com Issues, você sabe exatamente o que já foi feito, o que está em andamento e o que ainda falta — mesmo semanas depois.',
    arquivo:'Issues no repositório GitHub',
    seguro:'Apenas organização. Zero risco ao sistema em produção.',
  },
  {
    color:'#378ADD',tag:'tag-future',tagText:'Em seguida',
    title:'IA implementa → você valida',
    sub:'Ciclo de desenvolvimento: tarefa por tarefa',
    analogy:'É como uma linha de montagem com controle de qualidade. A IA monta a peça, você inspeciona antes de colocar no produto final. Se está certo, vai para a próxima. Se não está, devolve para ajuste.',
    oQue:'O fluxo fica assim para cada issue:<br><br>1. Você abre a issue com a IA<br>2. A IA lê a SPEC + Skills e escreve o código<br>3. Você testa localmente (nunca direto em produção)<br>4. Se aprovado: <code>git commit</code> + <code>git push</code><br>5. Você valida em produção só depois<br>6. Fecha a issue, passa para a próxima<br><br>QA (Quality Assurance) é você nesse processo — testando se o que foi entregue funciona como o PRD descreveu.',
    porQue:'Tarefa por tarefa protege o sistema em produção. Nunca vai ao ar código que você não testou. O sistema continua rodando enquanto você desenvolve em paralelo.',
    arquivo:'Branch separada por feature — nunca commitando direto na main',
    seguro:'<span class="safe-badge"><i class="ti ti-shield-check" aria-hidden="true"></i> Produção protegida — desenvolvimento em branch isolada</span>',
  },
];

const container=document.getElementById('steps');
steps.forEach((s,i)=>{
  const wrap=document.createElement('div');
  wrap.className='step';
  const numCol=document.createElement('div');
  numCol.className='step-num';
  const circle=document.createElement('div');
  circle.className='num-circle';
  circle.style.background=s.color+'22';
  circle.style.color=s.color;
  circle.style.border='0.5px solid '+s.color+'44';
  circle.textContent=i+1;
  const vl=document.createElement('div');
  vl.className='vline';
  vl.style.background=i<steps.length-1?s.color+'33':'transparent';
  numCol.appendChild(circle);
  numCol.appendChild(vl);
  const body=document.createElement('div');
  body.className='step-body';
  body.innerHTML=`<div class="step-header"><span class="step-title">${s.title}</span><span class="step-tag ${s.tag}">${s.tagText}</span></div><div class="step-sub">${s.sub}</div><div class="step-detail" id="d${i}"><div class="detail-section"><div class="detail-label">O que é</div><div class="detail-text">${s.oQue}</div></div><div class="detail-section"><div class="analogy-box"><strong>Analogia:</strong> ${s.analogy}</div></div><div class="detail-section"><div class="detail-label">Por que é necessário</div><div class="detail-text">${s.porQue}</div></div><div class="detail-section"><div class="detail-label">Arquivo / entregável</div><div class="detail-text">${s.arquivo}</div></div><div class="detail-section"><div class="detail-label">Segurança</div><div class="detail-text">${s.seguro}</div></div><button class="cta-btn" onclick="sendPrompt('Me ajuda a criar: ${s.title} para o SynerEduc')">Criar este artefato ↗</button></div>`;
  body.addEventListener('click',function(e){
    if(e.target.tagName==='BUTTON')return;
    const det=document.getElementById('d'+i);
    const open=det.classList.contains('open');
    document.querySelectorAll('.step-detail').forEach(d=>d.classList.remove('open'));
    document.querySelectorAll('.step-body').forEach(b=>b.classList.remove('active'));
    if(!open){det.classList.add('open');body.classList.add('active');}
  });
  wrap.appendChild(numCol);
  wrap.appendChild(body);
  container.appendChild(wrap);
});
</script>
