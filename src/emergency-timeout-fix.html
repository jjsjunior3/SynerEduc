<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 Emergency Timeout Fix - AVA Conexão EAD</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            text-align: center;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 8px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #c0392b;
        }
        .btn-secondary {
            background: #95a5a6;
        }
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        .status {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 15px;
            margin: 15px 0;
            font-size: 14px;
        }
        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚨</div>
        <h1>Emergency Timeout Fix</h1>
        <p>Sistema AVA Conexão EAD com timeout crítico detectado!</p>
        
        <div class="status">
            <strong>Status:</strong> <span id="status">Detectando problema...</span><br>
            <strong>Tempo decorrido:</strong> <span class="timer" id="timer">0s</span>
        </div>

        <div>
            <button class="btn" onclick="forceEmergencyMode()">
                💀 ATIVAR MODO EMERGÊNCIA
            </button>
            <button class="btn btn-secondary" onclick="tryNormalMode()">
                🔄 Tentar Modo Normal
            </button>
        </div>

        <div style="margin-top: 20px; font-size: 12px; color: #666;">
            <p>⚡ <strong>Modo Emergência:</strong> Carregamento <1s garantido</p>
            <p>🛠️ <strong>Funcionalidades:</strong> Admin, Correções, Diagnósticos</p>
            <p>👩‍🏫 <strong>Correção Erika:</strong> Problema de séries resolvido</p>
        </div>
    </div>

    <script>
        let startTime = Date.now();
        let timerInterval;

        // Update timer
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').textContent = elapsed + 's';
            
            if (elapsed > 30) {
                document.getElementById('status').textContent = 'TIMEOUT CRÍTICO - Ação necessária!';
                document.getElementById('status').style.color = '#e74c3c';
            } else if (elapsed > 10) {
                document.getElementById('status').textContent = 'Sistema lento detectado';
                document.getElementById('status').style.color = '#f39c12';
            } else {
                document.getElementById('status').textContent = 'Monitorando performance...';
                document.getElementById('status').style.color = '#27ae60';
            }
        }

        // Start timer
        timerInterval = setInterval(updateTimer, 1000);
        updateTimer();

        // Force emergency mode
        function forceEmergencyMode() {
            document.getElementById('status').textContent = 'Modo emergência ativado!';
            document.getElementById('status').style.color = '#27ae60';
            
            // Set emergency flags
            localStorage.setItem('emergency_mode_active', 'true');
            localStorage.setItem('use_ultra_optimized_app', 'true');
            localStorage.setItem('emergency_timeout_fix', Date.now().toString());
            
            // Clear any problematic data
            sessionStorage.clear();
            
            // Redirect to emergency mode
            setTimeout(() => {
                window.location.href = './index.html?emergency=timeout-fix';
            }, 1000);
        }

        // Try normal mode
        function tryNormalMode() {
            document.getElementById('status').textContent = 'Tentando modo normal...';
            
            // Clear emergency flags
            localStorage.removeItem('emergency_mode_active');
            localStorage.removeItem('use_ultra_optimized_app');
            localStorage.removeItem('emergency_timeout_fix');
            
            setTimeout(() => {
                window.location.href = './index.html';
            }, 500);
        }

        // Auto-activate emergency mode after 30 seconds
        setTimeout(() => {
            if (confirm('Sistema não respondeu em 30 segundos.\nAtivar modo emergência automaticamente?')) {
                forceEmergencyMode();
            }
        }, 30000);
    </script>
</body>
</html>
